<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛒 買い物リスト</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #fff8f2 0%, #fdebd0 100%);
      min-height: 100vh;
      color: #333;
    }

    /* ===== ヘッダー ===== */
    .app-header {
      background: #fff;
      box-shadow: 0 2px 12px rgba(230,120,30,0.10);
      padding: 16px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 14px;
    }

    .app-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #c0510a;
      letter-spacing: 1px;
    }

    .sync-status {
      position: absolute;
      right: 0;
      font-size: 0.72rem;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #bbb;
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.3s;
    }
    .sync-dot.online  { background: #27ae60; }
    .sync-dot.syncing { background: #f39c12; animation: pulse 1s infinite; }
    .sync-dot.error   { background: #e74c3c; }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ===== タブ ===== */
    .tabs {
      display: flex;
      overflow-x: auto;
      gap: 4px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 10px 18px;
      border-radius: 10px 10px 0 0;
      border: none;
      background: #f5e8dc;
      color: #b07050;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active { background: #f97c2f; color: #fff; }

    .tab .badge {
      display: inline-block;
      background: rgba(255,255,255,0.3);
      font-size: 0.68rem;
      border-radius: 10px;
      padding: 1px 6px;
      margin-left: 4px;
    }
    .tab:not(.active) .badge { background: #e8cdb8; color: #b07050; }

    /* ===== コンテンツ ===== */
    .content {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ===== 入力フォーム ===== */
    .form-card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 20px rgba(230,100,20,0.08);
      margin-bottom: 20px;
      border-top: 3px solid #f97c2f;
    }

    .form-card h2 {
      font-size: 0.9rem;
      color: #c0651a;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .form-row input,
    .form-row select {
      flex: 1;
      min-width: 130px;
      padding: 10px 14px;
      border: 1.5px solid #f0d4bc;
      border-radius: 10px;
      font-size: 0.95rem;
      background: #fffaf7;
      transition: border 0.2s;
      color: #444;
    }
    .form-row input:focus,
    .form-row select:focus {
      outline: none;
      border-color: #f97c2f;
      background: #fff;
    }
    .form-row input.error { border-color: #e74c3c; }

    .btn-add {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #f97c2f, #f5a623);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    .btn-add:hover  { opacity: 0.88; }
    .btn-add:active { transform: scale(0.98); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== サマリー ===== */
    .summary {
      background: #fff;
      border-radius: 14px;
      padding: 14px 18px;
      box-shadow: 0 3px 14px rgba(230,100,20,0.07);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .summary-item { text-align: center; }
    .summary-item .label { font-size: 0.72rem; color: #c0a090; margin-bottom: 2px; }
    .summary-item .value { font-size: 1.2rem; font-weight: 700; color: #7a4020; }
    .summary-item .value.done { color: #e67e22; }

    /* ===== フィルター ===== */
    .filter-bar {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #f0d4bc;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #b07050;
    }
    .filter-btn.active {
      background: #f97c2f;
      border-color: #f97c2f;
      color: #fff;
      font-weight: 600;
    }

    /* ===== アクションバー ===== */
    .action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 14px;
    }
    .btn-sm {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1.5px solid;
      background: none;
    }
    .btn-sm.danger { border-color: #e74c3c; color: #e74c3c; }
    .btn-sm.danger:hover { background: #e74c3c; color: #fff; }
    .btn-sm.muted  { border-color: #ddd; color: #bbb; }
    .btn-sm.muted:hover  { background: #f5ece4; color: #888; }

    /* ===== アイテムカード ===== */
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      box-shadow: 0 2px 8px rgba(200,90,20,0.07);
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 4px solid #f97c2f;
      transition: all 0.2s;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .item-card:hover { box-shadow: 0 4px 16px rgba(200,90,20,0.13); }
    .item-card.checked {
      opacity: 0.48;
      background: #fffaf7;
      border-left-color: #f5c88a !important;
    }
    .item-card.checked .item-name { text-decoration: line-through; color: #ccc; }

    .custom-check {
      width: 23px;
      height: 23px;
      border-radius: 7px;
      border: 2px solid #f0c8a0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      color: #fff;
      transition: all 0.2s;
    }
    .custom-check.checked { background: #f97c2f; border-color: #f97c2f; }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 0.97rem;
      font-weight: 600;
      color: #3a2010;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta { font-size: 0.75rem; color: #d4a888; margin-top: 3px; }

    .btn-delete {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: #e8cdb8;
      padding: 2px 5px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .btn-delete:hover { color: #e74c3c; }

    /* ===== 空状態 ===== */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #d4b8a0;
    }
    .empty-state .icon { font-size: 2.8rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; }

    /* ===== 読み込み中 ===== */
    .loading {
      text-align: center;
      padding: 40px;
      color: #f0c08a;
      font-size: 0.9rem;
    }
    .loading .spinner {
      font-size: 2rem;
      animation: spin 1.2s linear infinite;
      display: block;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="app-title">🛒 買い物リスト</div>
    <div class="sync-status">
      <div class="sync-dot syncing" id="syncDot"></div>
      <span id="syncText">接続中...</span>
    </div>
  </div>
  <div class="tabs" id="tabBar"></div>
</div>

<div class="content">

  <div class="form-card">
    <h2>➕ 商品を追加</h2>
    <div class="form-row">
      <input type="text" id="itemName" placeholder="商品名（例：牛乳）" />
    </div>
    <div class="form-row">
      <input type="number" id="itemQty" placeholder="数量" min="1" value="1" style="max-width:120px;flex:none;" />
      <select id="itemPlace">
        <option value="cocomori">🏠 cocomori</option>
        <option value="casamori">🏡 casamori</option>
        <option value="iemori">🏘 iemori</option>
        <option value="Amori">🏢 Amori</option>
        <option value="自宅">🛋 自宅</option>
      </select>
    </div>
    <button class="btn-add" id="btnAdd" onclick="addItem()" disabled>追加する</button>
  </div>

  <div class="summary">
    <div class="summary-item">
      <div class="label">合計</div>
      <div class="value" id="sumTotal">0</div>
    </div>
    <div class="summary-item">
      <div class="label">購入済み</div>
      <div class="value done" id="sumChecked">0</div>
    </div>
    <div class="summary-item">
      <div class="label">未購入</div>
      <div class="value" id="sumUnchecked">0</div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
    <button class="filter-btn" onclick="setFilter('unchecked',this)">未購入</button>
    <button class="filter-btn" onclick="setFilter('checked',this)">購入済み</button>
  </div>

  <div class="action-bar">
    <button class="btn-sm danger" onclick="clearChecked()">購入済みを削除</button>
    <button class="btn-sm muted"  onclick="clearAll()">全削除</button>
  </div>

  <div id="listContainer">
    <div class="loading"><span class="spinner">🔄</span>データを読み込み中...</div>
  </div>
</div>

<script>
  // =============================================
  // Firebase 初期化
  // =============================================
  const firebaseConfig = {
    apiKey: "AIzaSyCeURaeWTuYZD9sNWLBfIhxAFk2yFCb3Sc",
    authDomain: "morimi-b5641.firebaseapp.com",
    databaseURL: "https://morimi-b5641-default-rtdb.firebaseio.com",
    projectId: "morimi-b5641",
    storageBucket: "morimi-b5641.firebasestorage.app",
    messagingSenderId: "79061918114",
    appId: "1:79061918114:web:09112e158f8172af2692fb"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const itemsRef = db.ref('items');

  // =============================================
  // 状態
  // =============================================
  const PLACES = ['cocomori','casamori','iemori','Amori','自宅'];
  const PLACE_EMOJI = { cocomori:'🏠', casamori:'🏡', iemori:'🏘', Amori:'🏢', 自宅:'🛋' };

  let items = [];
  let currentPlace = PLACES[0];
  let currentFilter = 'all';
  let isConnected = false;

  // =============================================
  // 接続状態の監視
  // =============================================
  db.ref('.info/connected').on('value', snap => {
    isConnected = snap.val() === true;
    const dot  = document.getElementById('syncDot');
    const text = document.getElementById('syncText');
    const btn  = document.getElementById('btnAdd');
    if (isConnected) {
      dot.className  = 'sync-dot online';
      text.textContent = '同期中';
      btn.disabled = false;
    } else {
      dot.className  = 'sync-dot error';
      text.textContent = 'オフライン';
      btn.disabled = true;
    }
  });

  // =============================================
  // リアルタイム同期（全デバイス反映）
  // =============================================
  itemsRef.on('value', snapshot => {
    const data = snapshot.val();
    items = data
      ? Object.entries(data).map(([key, val]) => ({ ...val, firebaseKey: key }))
      : [];
    render();
  });

  // =============================================
  // タブ
  // =============================================
  function renderTabs() {
    document.getElementById('tabBar').innerHTML = PLACES.map(p => {
      const count = items.filter(i => i.place === p && !i.checked).length;
      const badge = count > 0 ? `<span class="badge">${count}</span>` : '';
      const active = p === currentPlace ? 'active' : '';
      return `<button class="tab ${active}" onclick="switchPlace('${p}')">${PLACE_EMOJI[p]} ${p}${badge}</button>`;
    }).join('');
  }

  function switchPlace(p) {
    currentPlace = p;
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    render();
  }

  // =============================================
  // アイテム操作（Firebase へ書き込み）
  // =============================================
  function addItem() {
    const nameEl = document.getElementById('itemName');
    const name = nameEl.value.trim();
    if (!name) {
      nameEl.classList.add('error');
      nameEl.focus();
      setTimeout(() => nameEl.classList.remove('error'), 1200);
      return;
    }
    const qty   = parseInt(document.getElementById('itemQty').value) || 1;
    const place = document.getElementById('itemPlace').value;

    itemsRef.push({ name, qty, place, checked: false });

    currentPlace = place;
    nameEl.value = '';
    document.getElementById('itemQty').value = '1';
    nameEl.focus();
  }

  function toggleCheck(firebaseKey, currentChecked) {
    itemsRef.child(firebaseKey).update({ checked: !currentChecked });
  }

  function deleteItem(firebaseKey) {
    itemsRef.child(firebaseKey).remove();
  }

  function clearChecked() {
    const targets = items.filter(i => i.place === currentPlace && i.checked);
    if (!targets.length) return;
    if (confirm(`「${currentPlace}」の購入済みアイテムをすべて削除しますか？`)) {
      targets.forEach(i => itemsRef.child(i.firebaseKey).remove());
    }
  }

  function clearAll() {
    const targets = items.filter(i => i.place === currentPlace);
    if (!targets.length) return;
    if (confirm(`「${currentPlace}」のアイテムをすべて削除しますか？`)) {
      targets.forEach(i => itemsRef.child(i.firebaseKey).remove());
    }
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // =============================================
  // 描画
  // =============================================
  function render() {
    renderTabs();

    const placeItems = items.filter(i => i.place === currentPlace);
    let filtered = placeItems;
    if (currentFilter === 'unchecked') filtered = placeItems.filter(i => !i.checked);
    if (currentFilter === 'checked')   filtered = placeItems.filter(i =>  i.checked);

    const total   = placeItems.length;
    const checked = placeItems.filter(i => i.checked).length;
    document.getElementById('sumTotal').textContent     = total;
    document.getElementById('sumChecked').textContent   = checked;
    document.getElementById('sumUnchecked').textContent = total - checked;

    const container = document.getElementById('listContainer');

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state">
        <div class="icon">${PLACE_EMOJI[currentPlace]}</div>
        <p>${total === 0
          ? '「' + currentPlace + '」の買い物リストはまだ空です。<br>上のフォームから追加してみましょう！'
          : '表示するアイテムがありません。'}</p>
      </div>`;
      return;
    }

    container.innerHTML = filtered.map(item => {
      const cc = item.checked ? 'checked' : '';
      return `
        <div class="item-card ${cc}">
          <div class="custom-check ${cc}" onclick="toggleCheck('${item.firebaseKey}', ${item.checked})">${item.checked ? '✓' : ''}</div>
          <div class="item-info">
            <div class="item-name">${esc(item.name)}</div>
            <div class="item-meta">数量：${item.qty}</div>
          </div>
          <button class="btn-delete" onclick="deleteItem('${item.firebaseKey}')" title="削除">🗑</button>
        </div>`;
    }).join('');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enterキー
  ['itemName','itemQty'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });
  });

  document.getElementById('itemPlace').addEventListener('change', e => {
    currentPlace = e.target.value;
    render();
  });
</script>
</body>
</html>
